<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architect OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#0a0a0a;color:white;font-family:sans-serif;">

<div id="app" style="padding:20px;"></div>

<script>

// ===== BASIC STATE =====
const state = {
  wave: 70,
  integrity: 50
};

// ===== SIMPLE UI =====
function render() {
  document.getElementById("app").innerHTML = `
    <h1 style="font-size:24px;margin-bottom:20px;">Architect OS</h1>

    <div style="background:#111;padding:20px;border-radius:10px;">
      <p>Wave: ${Math.round(state.wave)}</p>
      <p>Integrity: ${Math.round(state.integrity)}</p>
    </div>

    <button onclick="panic()" style="margin-top:20px;padding:10px 20px;background:red;">
      PANIC
    </button>
  `;
}

// ===== ENGINE =====
setInterval(() => {
  state.wave += (Math.random() - 0.5) * 2;
  render();
}, 1000);

// ===== PANIC =====
function panic() {
  alert("RESET");
  state.wave = 90;
}

// ===== INIT =====
render();

</script>

</body>
</html>
