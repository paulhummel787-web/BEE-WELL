<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect OS</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body style="background:black; color:white; padding:20px; font-family:monospace;">

  <h1>Architect OS Debug</h1>
  <div id="log"></div>

  <script type="module">

    const log = (msg) => {
      document.getElementById("log").innerHTML += "<div>" + msg + "</div>";
      console.log(msg);
    };

    try {
      log("Loading state...");
      const stateModule = await import("./core/state.js");

      log("Loading layout...");
      const layoutModule = await import("./ui/layout.js");

      log("Loading views...");
      await import("./views/dashboard.js");
      await import("./views/mvs.js");
      await import("./views/fox.js");
      await import("./views/stats.js");
      await import("./views/terminal.js");
      await import("./views/journal.js");

      log("Loading modules...");
      await import("./modules/engine.js");
      await import("./modules/hud.js");
      await import("./modules/analytics.js");
      await import("./modules/aiCoach.js");
      await import("./modules/predictor.js");
      await import("./modules/missions.js");

      log("INIT...");
      stateModule.initState();

      log("SUCCESS — SYSTEM LOADED");

    } catch (e) {
      log("ERROR:");
      log(e.message);
      console.error(e);
    }

  </script>

</body>
</html>
