<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pilot and the Storm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#080808;
color:#f5f5f5;
font-family:Inter,sans-serif;
overflow-x:hidden;
transition:all .6s ease;
}

/* BLOBS (your original vibe, improved) */
.blob{
position:fixed;
border-radius:50%;
filter:blur(140px);
z-index:-1;
animation:pulse 12s infinite ease-in-out;
}

@keyframes pulse{
0%,100%{opacity:.25;transform:scale(1)}
50%{opacity:.6;transform:scale(1.1)}
}

/* GLASS */
.glass{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
transition:all .3s;
}

/* HOVER LIFT */
.glass:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.06);
}

/* FADE */
.fade{animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* SANCTUARY */
body.sanctuary{
font-family:serif;
filter:sepia(.3) contrast(.9) saturate(.85);
}

/* BUTTON GLOW */
.glow{
box-shadow:0 0 20px rgba(245,158,11,.3);
}
</style>
</head>

<body>

<!-- BLOBS -->
<div class="blob w-[500px] h-[500px] bg-amber-500/10 -top-40 -left-40"></div>
<div class="blob w-[600px] h-[600px] bg-blue-500/10 -bottom-40 -right-40"></div>

<div class="max-w-xl mx-auto p-6 pb-28">

<header class="flex justify-between mb-6">
<div id="clock" class="font-mono text-lg opacity-70"></div>

<div class="flex gap-2">
<button onclick="Engine.panic()" class="px-3 py-1 text-xs bg-red-500/20 text-red-400 rounded-full">PANIC</button>
<button onclick="Engine.toggleSanctuary()" class="px-3 py-1 glass rounded-full text-xs">☯</button>
</div>
</header>

<div id="view"></div>

</div>

<!-- NAV -->
<nav class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around">
<button onclick="Engine.route('base')">Base</button>
<button onclick="Engine.route('exec')">Exec</button>
<button onclick="Engine.route('doctrine')">Doctrine</button>
<button onclick="Engine.route('logs')">Logs</button>
</nav>

<script>

/* =========================
   ENGINE
========================= */

const Engine = {

state:{
tab:'base',
wave:70,
logs:[],
sanctuary:false,
chapter:1
},

init(){
this.tick()
this.render()
setInterval(()=>this.tick(),1000)
},

tick(){
document.getElementById('clock').innerText =
new Date().toLocaleTimeString()
},

route(t){
this.state.tab=t
this.render()
},

render(){
const v=document.getElementById('view')

if(this.state.sanctuary){
v.innerHTML=Sanctuary.render()
return
}

v.innerHTML=Modules[this.state.tab]()
},

log(msg){
this.state.logs.unshift(msg)
},

panic(){
this.log("PANIC")
Anchor.card("You are not alone. God is with you.")
},

toggleSanctuary(){
this.state.sanctuary=!this.state.sanctuary
document.body.classList.toggle('sanctuary')
this.render()
}

}

/* =========================
   MODULES
========================= */

const Modules = {

base(){
return `
<div class="space-y-6 fade">

<div class="glass p-5 rounded-2xl glow">
<p class="text-xs opacity-40 mb-1">Resiliency Wave</p>
<p class="text-2xl font-mono mb-3">${Engine.state.wave}%</p>

<input type="range" min="0" max="100" value="${Engine.state.wave}"
oninput="Engine.state.wave=this.value;State.react()"
class="w-full">
</div>

<div class="grid grid-cols-2 gap-3">
<button onclick="Stillness.activate()" class="glass p-4 rounded-xl text-sm">Be Still</button>
<button onclick="Anchor.strength()" class="glass p-4 rounded-xl text-sm">Strength</button>
</div>

</div>`
},

exec(){
return `
<div class="space-y-4 fade text-center">

<div class="glass p-4 rounded-xl">
<p class="text-sm mb-2">What do you need?</p>

<div class="flex justify-center gap-3">
<button onclick="Anchor.strength()" class="text-xs">Strength</button>
<button onclick="Anchor.peace()" class="text-xs">Peace</button>
</div>
</div>

</div>`
},

doctrine(){
return `
<div class="space-y-3 fade">

${Doctrine.chapters.map(c=>`
<div onclick="UI.read(${c.id})"
class="glass p-3 rounded-xl cursor-pointer">
${c.id}. ${c.title}
</div>`).join('')}

</div>`
},

logs(){
return `
<div class="glass p-4 text-xs fade space-y-1">
${Engine.state.logs.map(l=>`<div>${l}</div>`).join('')}
</div>`
}

}

/* =========================
   DOCTRINE
========================= */

const Doctrine={
chapters:[
{ id:1,title:"The Storm Is Real",body:"The storm is real, but it is not your end."},
{ id:2,title:"You Are Not the Storm",body:"You are the observer, not the chaos."},
{ id:3,title:"Noise Is Not Truth",body:"Loud does not mean true."},
{ id:4,title:"The Body Remembers",body:"Your system holds memory."},
{ id:5,title:"Fragmentation",body:"You are not lost."},
{ id:6,title:"The Lie",body:"You are not a mistake."},
{ id:7,title:"Heat",body:"Intensity distorts reality."},
{ id:8,title:"Collapse",body:"Stabilize."},
{ id:9,title:"Control",body:"Control is not safety."},
{ id:10,title:"Abandonment",body:"You are not alone."},

{ id:11,title:"Pilot",body:"There is awareness in you."},
{ id:12,title:"Identity",body:"You are given identity."},
{ id:13,title:"Made",body:"You are intentional."},
{ id:14,title:"Carried",body:"You are held."},
{ id:15,title:"Step",body:"One step is enough."},

{ id:16,title:"Strength",body:"Strength is given."},
{ id:17,title:"Weakness",body:"Power enters here."},
{ id:18,title:"Peace",body:"Peace guards your mind."},

{ id:19,title:"Stillness",body:"Stillness is strength."},
{ id:20,title:"Clarity",body:"Truth comes quietly."},
{ id:21,title:"Restart",body:"You can begin again."},
{ id:22,title:"Rebuild",body:"Nothing is wasted."},
{ id:23,title:"Stable",body:"Stability grows slowly."},

{ id:24,title:"Trust",body:"Growth is unseen."},
{ id:25,title:"Not Alone",body:"You never were alone."},
{ id:26,title:"Victory",body:"The storm does not win."}
]
}

/* =========================
   UI READER
========================= */

const UI={
read(id){
const c=Doctrine.chapters.find(x=>x.id===id)

const o=document.createElement("div")
o.className="fixed inset-0 bg-black/90 p-6 z-50 fade"

o.innerHTML=`
<button onclick="this.parentElement.remove()" class="text-xs opacity-40">Back</button>
<h1 class="text-xl mt-4">${c.title}</h1>
<p class="mt-4 opacity-80">${c.body}</p>
`

document.body.appendChild(o)
}
}

/* =========================
   ANCHORS (UPGRADED UI)
========================= */

const Anchor={

card(text){
const c=document.createElement("div")
c.className="fixed bottom-24 left-1/2 -translate-x-1/2 glass p-4 rounded-xl fade"
c.innerText=text
document.body.appendChild(c)
setTimeout(()=>c.remove(),5000)
},

strength(){
this.card("I can do all things through Christ.")
},

peace(){
this.card("The peace of God guards my mind.")
}

}

/* =========================
   STILLNESS
========================= */

const Stillness={
activate(){
const o=document.createElement("div")
o.className="fixed inset-0 bg-black flex items-center justify-center z-50 fade"

o.innerHTML=`
<div class="text-center">
<p class="text-lg italic mb-4">"Be still, and know that I am God."</p>
<button onclick="this.parentElement.parentElement.remove()" class="text-xs opacity-40">Return</button>
</div>
`

document.body.appendChild(o)
}
}

/* =========================
   STATE REACTION
========================= */

const State={
react(){
if(Engine.state.wave < 30){
Anchor.strength()
}
if(Engine.state.wave < 15){
Anchor.card("You are held. You are not alone.")
}
}
}

/* INIT */
Engine.init()

</script>

</body>
</html>
