<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architect OS</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: sans-serif;
    }
  </style>

</head>

<body>

<div id="app"></div>

<script type="module">

try {

  // ===== IMPORT CORE FIRST =====
  await import("./core/state.js");

  // ===== IMPORT VIEW (ONLY DASHBOARD FOR NOW) =====
  const dashboard = await import("./views/dashboard.js");

  // ===== IMPORT MODULES =====
  await import("./modules/engine.js");
  await import("./modules/hud.js");
  await import("./modules/panic.js");
  await import("./modules/anchor.js");

  // ===== INIT =====
  window.initState();

  // ===== RENDER LOOP (FORCED DASHBOARD) =====
  function render() {
    document.getElementById("app").innerHTML =
      dashboard.renderDashboard();
  }

  render();
  setInterval(render, 1000);

} catch (e) {

  document.body.innerHTML = `
    <div style="color:red;padding:20px;">
      ERROR:<br>${e.message}
    </div>
  `;

  console.error(e);
}

</script>

</body>
</html>
