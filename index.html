<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Pilot and the Storm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Architect OS — Bee Well</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { <div class="bg-blob"></div>
<div class="bg-blob"></div>
    background:#0a0a0a;
    color:white;
    font-family: system-ui;
    transition: all .6s ease;
}

/* SANCTUARY MODE */
body.sanctuary {
    background:#050508;
    filter:saturate(.8) contrast(.9);
}

/* GLASS UI */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border:1px solid rgba(255,255,255,0.08);
}

/* NAV */
.nav-btn.active {
    opacity:1;
    color:#818cf8;
}

.nav-btn {
    opacity:.4;
    transition:.2s;
}

/* FADE */
.fade {
    animation: fade .3s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(6px)}
    to {opacity:1}
}

/* TERMINAL */
.terminal {
    background:black;
    color:#0f0;
    font-family: monospace;
}

</style>
</head>

<body class="p-4">

<!-- NAV -->
<div class="flex gap-4 mb-4 text-xs uppercase font-bold">
    <button class="nav-btn active" onclick="switchTab('base')">Base</button>
    <button class="nav-btn" onclick="switchTab('book')">Book</button>
    <button class="nav-btn" onclick="switchTab('anchor')">Anchors</button>
    <button class="nav-btn" onclick="switchTab('terminal')">Terminal</button>
</div>

<!-- MAIN -->
<div id="view" class="fade"></div>

<script>

/* =========================
STATE
========================= */
const state = {
    tab:'base',
    wave:70,
    integrity:50,
    sanctuary:false,
    logs:[]
};

/* =========================
BOOK (33 chapters)
========================= */
const BOOK = [
"Symptom Soup — everything overlaps.",
"Shutdown is protection.",
"Pilot vs Architect.",
"Color over thinking.",
"Fix state first.",

"90 second emotions.",
"Time blindness.",
"Habit stacking.",
"Fueling logic.",
"Fire kit.",

"Anxiety = simulation.",
"ADHD scatter.",
"Emotional heat.",
"CPTSD shadow.",
"Depression gravity.",

"Dissociation fog.",
"MVS = one step.",
"10/20 brakes.",
"Memory shield.",

"Sanctuary design.",
"Social governor.",
"Sensory override.",
"Report color.",

"Sleep docking.",
"Medication tracking.",
"Movement reset.",
"Daily wins.",

"Strategic drop.",
"Chase the fox.",
"Bodyguards.",
"Identity anchors.",
"Support grid.",
"Architect creed."
];

/* =========================
SCRIPTURE ENGINE
========================= */
const ANCHORS = [
["I am a mistake","Psalm 139:14","I am fearfully made"],
["I am unwanted","Ephesians 1:4","I am chosen"],
["I am alone","Deuteronomy 31:8","God is ahead of me"],
["I am overwhelmed","2 Tim 1:7","I have a sound mind"],
["I can't","Phil 4:13","I can take one step"]
];

let anchorIndex=0;

/* =========================
RENDER
========================= */
function switchTab(tab){
    state.tab=tab;

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');

    render();
}

function render(){
    const v=document.getElementById('view');

    if(state.tab==='base'){
        v.innerHTML=`
        <div class="space-y-4 fade">

            <div class="glass p-4 rounded-xl">
                <p class="text-xs opacity-50">Wave</p>
                <p class="text-xl">${state.wave}%</p>
            </div>

            <div class="glass p-4 rounded-xl">
                <p class="text-xs opacity-50">Integrity</p>
                <p class="text-xl">${state.integrity}%</p>
            </div>

            <button onclick="toggleSanctuary()" class="glass p-3 rounded-xl w-full">
                ${state.sanctuary?'Exit Sanctuary':'Enter Sanctuary'}
            </button>

        </div>`;
    }

    if(state.tab==='book'){
        v.innerHTML=`
        <div class="space-y-2 fade">
            ${BOOK.map((c,i)=>`
                <div class="glass p-3 rounded-xl text-sm">
                    <b>Chapter ${i+1}</b><br>${c}
                </div>
            `).join('')}
        </div>`;
    }

    if(state.tab==='anchor'){
        const a=ANCHORS[anchorIndex];
        v.innerHTML=`
        <div class="glass p-6 rounded-xl fade">
            <p class="opacity-40 text-xs">Lie</p>
            <p>${a[0]}</p>

            <p class="opacity-40 text-xs mt-3">${a[1]}</p>
            <p>${a[2]}</p>

            <button onclick="nextAnchor()" class="mt-4 px-4 py-2 bg-indigo-500 rounded">
                Next
            </button>
        </div>`;
    }

    if(state.tab==='terminal'){
        v.innerHTML=`
        <div class="terminal p-4 rounded-xl">
            <div id="output" class="h-40 overflow-y-auto text-xs"></div>
            <input id="cmd" class="w-full mt-2 bg-black outline-none" placeholder="/help"
            onkeydown="handleCmd(event)">
        </div>`;
    }
}

/* =========================
FUNCTIONS
========================= */

function toggleSanctuary(){
    state.sanctuary=!state.sanctuary;
    document.body.classList.toggle('sanctuary');
}

function nextAnchor(){
    anchorIndex=(anchorIndex+1)%ANCHORS.length;
    render();
}

/* TERMINAL */
function handleCmd(e){
    if(e.key==="Enter"){
        const val=e.target.value;
        log("> "+val);

        if(val==="/help"){
            log("/wave /anchor /sanctuary");
        }

        if(val.startsWith("/wave")){
            const num=parseInt(val.split(" ")[1]);
            if(num) state.wave=num;
            render();
        }

        if(val==="/anchor"){
            switchTab('anchor');
        }

        if(val==="/sanctuary"){
            toggleSanctuary();
        }

        e.target.value="";
    }
}

function log(msg){
    const out=document.getElementById('output');
    if(!out) return;
    out.innerHTML+=`<div>${msg}</div>`;
    out.scrollTop=out.scrollHeight;
}

/* INIT */
render();

</script>

</body>
</html>
</style>
</head>

<body class="p-6">

<h1 class="text-2xl font-bold mb-6">The Pilot and the Storm</h1>

<div class="grid grid-cols-4 gap-4">

<!-- SIDEBAR -->
<div class="col-span-1 glass p-4 rounded-xl h-[80vh] overflow-y-auto">
    <h2 class="text-xs uppercase opacity-50 mb-3">Chapters</h2>
    <div id="chapter-list"></div>
</div>

<!-- MAIN VIEW -->
<div class="col-span-3 space-y-6">

    <div id="chapter-view" class="glass p-6 rounded-xl"></div>

    <!-- SCRIPTURE ENGINE -->
    <div class="glass p-6 rounded-xl">
        <h2 class="text-xs uppercase opacity-50 mb-4">Identity Anchors</h2>
        <button onclick="nextAnchor()" class="px-4 py-2 bg-indigo-500 rounded">Next Anchor</button>

        <div id="anchor-display" class="mt-4 space-y-2"></div>
    </div>

</div>

</div>

<script>

/* =========================
   📖 BOOK ENGINE (33 CHAPTERS)
========================= */

const BOOK = [
{title:"1. The Landscape of the Storm", content:`The complex mind lives in a Symptom Soup...`},
{title:"2. The Anatomy of Shutdown", content:`Shutdown is not failure...`},
{title:"3. The Architect vs The Pilot", content:`Two roles govern the system...`},
{title:"4. Colour Frequencies", content:`Use colour instead of analysis...`},
{title:"5. Prime Directive", content:`Fix the state, then the step.`},

{title:"6. The 90-Second Rule", content:`Emotions last 90 seconds chemically.`},
{title:"7. Time Blindness", content:`Time must be externalized.`},
{title:"8. Habit Stacking", content:`Attach new habits to old ones.`},
{title:"9. Fueling Logic", content:`Body dictates mind.`},
{title:"10. Fire Kit", content:`Pre-built tools for crisis.`},

{title:"11. Anxiety Pulse", content:`Anxiety simulates danger.`},
{title:"12. ADHD Scatter", content:`Attention cannot land.`},
{title:"13. Emotional Heat", content:`Feelings hit instantly.`},
{title:"14. CPTSD Shadow", content:`Past informs present threat.`},
{title:"15. Depression Gravity", content:`Energy collapses inward.`},

{title:"16. Dissociation Fog", content:`System disconnects.`},
{title:"17. MVS Protocol", content:`Move one pebble.`},
{title:"18. 10/20 Brakes", content:`Interrupt loops physically.`},
{title:"19. Memory Shield", content:`Externalize all thoughts.`},

{title:"20. Sanctuary Design", content:`Reduce sensory noise.`},
{title:"21. Social Governor", content:`Use boundaries.`},
{title:"22. Sensory Override", content:`Use body to reset brain.`},
{title:"23. Reporting Visibility", content:`Use color instead of explanation.`},

{title:"24. Sleep Docking", content:`Sleep is system repair.`},
{title:"25. Medication Ledger", content:`Track signal vs noise.`},
{title:"26. Metabolic Reset", content:`Move body to reset state.`},
{title:"27. Daily Ledger", content:`Record wins.`},

{title:"28. Strategic Filter", content:`Drop non-essential tasks.`},
{title:"29. Chase the Fox", content:`Focus on one high-impact task.`},
{title:"30. Bodyguards", content:`Protective patterns exist.`},
{title:"31. Identity Anchors", content:`Truth over feelings.`},
{title:"32. Support Grid", content:`You need people.`},
{title:"33. The Architect’s Creed", content:`You are built to navigate.`}
];


/* =========================
   🧠 SCRIPTURE ENGINE
========================= */

const ANCHORS = [
{
lie:"I am a mistake",
truth:"Psalm 139:14",
affirmation:"I am fearfully and wonderfully made."
},
{
lie:"I am unwanted",
truth:"Ephesians 1:4",
affirmation:"I am chosen."
},
{
lie:"I am alone",
truth:"Deuteronomy 31:8",
affirmation:"God is already in my tomorrow."
},
{
lie:"I am overwhelmed",
truth:"2 Timothy 1:7",
affirmation:"I have a sound mind."
},
{
lie:"I can't do this",
truth:"Philippians 4:13",
affirmation:"I can take one step."
}
];


/* =========================
   ⚙️ UI LOGIC
========================= */

const chapterList = document.getElementById('chapter-list');
const chapterView = document.getElementById('chapter-view');

BOOK.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = "block w-full text-left text-xs py-1 opacity-60 hover:opacity-100";
    btn.innerText = ch.title;
    btn.onclick = () => loadChapter(i);
    chapterList.appendChild(btn);
});

function loadChapter(i) {
    const ch = BOOK[i];
    chapterView.innerHTML = `
        <h2 class="text-lg font-bold mb-4">${ch.title}</h2>
        <p class="opacity-70">${ch.content}</p>
    `;
}

loadChapter(0);


/* =========================
   🔁 ANCHOR ROTATOR
========================= */

let anchorIndex = 0;

function nextAnchor() {
    const a = ANCHORS[anchorIndex];

    document.getElementById('anchor-display').innerHTML = `
        <div class="anchor">
            <p class="text-xs opacity-40">Lie</p>
            <p>${a.lie}</p>
        </div>
        <div class="anchor">
            <p class="text-xs opacity-40">Truth (${a.truth})</p>
            <p>${a.affirmation}</p>
        </div>
    `;

    anchorIndex = (anchorIndex + 1) % ANCHORS.length;
}

nextAnchor();

</script>

</body>
</html>
