<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect OS</title>

  <!-- PWA -->

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
    }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>

</head>

<body>

  <!-- ROOT -->

  <div id="app"></div>

  <!-- APP -->

  <script type="module">

    // === CORE ===
    import { initState } from "./core/state.js";

    // === UI ===
    import { renderLayout, getTab } from "./ui/layout.js";

    // === VIEWS ===
    import { renderDashboard } from "./views/dashboard.js";
    import { renderMVS } from "./views/mvs.js";
    import { renderFox } from "./views/fox.js";
    import { renderStats } from "./views/stats.js";
    import { renderTerminal } from "./views/terminal.js";
    import { renderJournal } from "./views/journal.js";

    // === MODULES ===
    import "./modules/engine.js";
    import "./modules/hud.js";
    import "./modules/analytics.js";
    import "./modules/aiCoach.js";
    import "./modules/predictor.js";
    import "./modules/missions.js";

    // === INIT ===
    initState();

    // === ROUTER ===
    window.renderApp = function () {
      const tab = getTab();

      let view = "";

      if (tab === "dashboard") view = renderDashboard();
      if (tab === "mvs") view = renderMVS();
      if (tab === "fox") view = renderFox();
      if (tab === "stats") view = renderStats();
      if (tab === "terminal") view = renderTerminal();
      if (tab === "journal") view = renderJournal();

      document.getElementById("app").innerHTML =
        renderLayout(view);
    };

    // === FIRST RENDER ===
    window.renderApp();

    // === SYSTEM LOOP ===
    setInterval(() => {
      window.renderApp();
    }, 1000);

  </script>

  <!-- SERVICE WORKER -->

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>

</body>
</html>
