<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architect OS</title>

  <!-- PWA -->

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: system-ui, sans-serif;
      margin: 0;
    }

    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
    }
  </style>

</head>

<body>

<div id="app"></div>

<script type="module">

// ===== UI =====
import { renderLayout, getTab } from "./ui/layout.js";

// ===== VIEWS =====
import { renderDashboard } from "./views/dashboard.js";
import { renderMVS } from "./views/mvs.js";
import { renderFox } from "./views/fox.js";
import { renderStats } from "./views/stats.js";
import { renderTerminal } from "./views/terminal.js";
import { renderJournal } from "./views/journal.js";

// ===== CORE =====
await import("./core/state.js");

// ===== MODULES =====
await import("./modules/engine.js");
await import("./modules/hud.js");
await import("./modules/analytics.js");
await import("./modules/aiCoach.js");
await import("./modules/predictor.js");
await import("./modules/missions.js");
await import("./modules/panic.js");
await import("./modules/anchor.js");

// ===== INIT =====
window.initState();

// ===== ROUTER =====
window.renderApp = function () {
  const tab = getTab();

  let view = "";

  if (tab === "dashboard") view = renderDashboard();
  if (tab === "mvs") view = renderMVS();
  if (tab === "fox") view = renderFox();
  if (tab === "stats") view = renderStats();
  if (tab === "terminal") view = renderTerminal();
  if (tab === "journal") view = renderJournal();

  document.getElementById("app").innerHTML =
    renderLayout(view);
};

// ===== FIRST LOAD =====
window.renderApp();

// ===== LOOP =====
setInterval(() => {
  window.renderApp();
}, 1500);

</script>

<!-- SERVICE WORKER -->

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
