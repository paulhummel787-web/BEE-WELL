<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Architect OS</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: sans-serif;
    }
  </style>

</head>

<body>

<!-- ✅ THIS MUST EXIST BEFORE SCRIPT -->

<div id="app"></div>

<script type="module">

try {

  await import("./core/state.js");

  const layout = await import("./ui/layout.js");

  const dashboard = await import("./views/dashboard.js");
  const mvs = await import("./views/mvs.js");
  const journal = await import("./views/journal.js");

  await import("./modules/engine.js");
  await import("./modules/hud.js");
  await import("./modules/panic.js");
  await import("./modules/anchor.js");

  window.initState();

  function render() {
    const tab = layout.getTab();

    let view = "";

    if (tab === "dashboard") view = dashboard.renderDashboard();
    if (tab === "mvs") view = mvs.renderMVS();
    if (tab === "journal") view = journal.renderJournal();

    const app = document.getElementById("app");

    if (!app) {
      throw new Error("App container missing");
    }

    app.innerHTML = layout.renderLayout(view);
  }

  render();
  setInterval(render, 1000);

} catch (e) {

  document.body.innerHTML = `
    <div style="color:red;padding:20px;">
      ERROR:<br>${e.message}
    </div>
  `;

  console.error(e);
}

</script>

</body>
</html>
