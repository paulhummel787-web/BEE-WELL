{lie:"I am unwanted",truth:"Ephesians 1:4",affirmation:"I am chosen"},
{lie:"I am alone",truth:"Deuteronomy 31:8",affirmation:"God is with me"},

/* NAV */
function switchTab(tab){
    state.tab=tab;

    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

/* RENDER */
function render(){
    const v=document.getElementById('view');

    if(state.tab==='base'){

            <div class="glass p-5">

}

function nextAnchor(){
    anchorIndex=(anchorIndex+1)%ANCHORS.length;
    render();
}

/* TERMINAL */
function cmdHandler(e){
    if(e.key==="Enter"){
        const val=e.target.value;
        log("> "+val);

        if(val==="/wave 100") state.wave=100;
        if(val==="/anchor") switchTab('anchor');

        render();
        e.target.value="";
    }
}

function log(msg){
    const out=document.getElementById('output');
    if(!out) return;
    out.innerHTML+=`<div>${msg}</div>`;
}

/* INIT */

<script>

    state.color=c;
    render();

    <div class="grid grid-cols-3 gap-2 mt-4">
        ${Object.keys(COLORS).map(c=>`

        class="glass p-3 rounded-xl text-xs hover:scale-105 transition">

        </button>
        `).join('')}
    </div>`;
}

</script>
<script>

/* =========================

========================= */

function renderBase(){

}

function renderGuidance(){

    const map={
        yellow:"Too many inputs. Land one task.",
        red:"Pause. 90 seconds. No reaction.",
        blue:"Shrink task. Move one pebble.",
        purple:"This wave will pass.",
        grey:"Reconnect through body.",
        orange:"Slow down. You are not late."
    };

    return `
    <div class="glass p-4 col-span-2">
        <p class="text-xs opacity-40">Guidance</p>
        <p>${map[state.color]}</p>
    </div>`;
}

</script>
<script>

/* =========================

========================= */

<script>

ANCHOR SYSTEM
========================= */

const ANCHORS=[];

    ANCHORS.push({lie,truth,affirmation});
}

function renderAnchor(){
    if(ANCHORS.length===0) return `<div>No anchors loaded</div>`;

    const a=ANCHORS[anchorIndex];

    return `
    <div class="glass p-6 text-center fade">

        <p class="text-xs opacity-40">Lie</p>

<script>

/* =========================
TERMINAL
========================= */

function renderTerminal(){
    return `
    <div class="terminal p-4 rounded-xl">

        <div id="output" class="h-40 overflow-y-auto text-xs"></div>

        <input id="cmd"
        class="w-full bg-black mt-2 outline-none"
        placeholder="/help"
        onkeydown="handleCmd(event)">

    </div>`;
}

function handleCmd(e){
    if(e.key==="Enter"){
        const val=e.target.value;
        log("> "+val);

        if(val.startsWith("/wave")){
            state.wave=parseInt(val.split(" ")[1])||state.wave;
        }

        if(val.startsWith("/color")){
            setColor(val.split(" ")[1]);
        }

        render();
        e.target.value="";
    }
}

function log(msg){
    const out=document.getElementById('output');
    if(!out) return;
    out.innerHTML+=`<div>${msg}</div>`;
}

</script>

function renderBook(){
    const v = document.getElementById('view');

    v.innerHTML = `
    <div class="book-container fade">

        <div class="glass p-3 chapter-list">
            ${FULL_BOOK.map((c,i)=>`
                <button class="chapter-btn ${i===currentChapter?'active':''}" onclick="loadChapter(${i})">

            `).join('')}

        <div class="glass p-6 chapter-view">
            <h2 class="text-lg font-bold mb-4">${FULL_BOOK[currentChapter].title}</h2>

            </button>
        </div>

    </div>
    `;
}

function loadChapter(i){
    currentChapter = i;
    renderBook();
}

/* =========================
📖 FULLSCREEN READER
========================= */

function openReader(){
    const ch = FULL_BOOK[currentChapter];

    const overlay = document.createElement('div');
    overlay.className = "reader-mode";

    overlay.innerHTML = `
        <button onclick="this.parentElement.remove()" class="mb-6 opacity-40">Close</button>
        <h2>${ch.title}</h2>
        <p>${ch.content.replace(/\n/g,'<br><br>')}</p>
    `;

    document.body.appendChild(overlay);
}
