<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee Well | The Pilot & The Storm</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
    --bg:#050505;
    --accent:#f59e0b;
    --blue:#3b82f6;
}

body {
    background: radial-gradient(circle at top, #111, #000);
    color: #f5f5f5;
    font-family: Inter, sans-serif;
    overflow-x:hidden;
}

/* glowing blobs */
.blob {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.15;
    z-index:-1;
    animation: float 12s infinite ease-in-out;
}
.blob1 { background: orange; top:-200px; left:-200px; }
.blob2 { background: blue; bottom:-200px; right:-200px; }

@keyframes float {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-40px)}
}

/* cards */
.card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:20px;
    transition:.3s;
}
.card:hover {
    transform:translateY(-3px);
    border-color:rgba(255,255,255,0.2);
}

/* button glow */
.btn {
    padding:12px 20px;
    border-radius:999px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    transition:.3s;
}
.btn:hover {
    background:var(--accent);
    color:#000;
}

/* wave slider */
input[type=range] {
    width:100%;
}

/* sanctuary mode */
body.sanctuary {
    filter: sepia(0.3) saturate(0.7);
    font-family: Georgia, serif;
}
</style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="max-w-xl mx-auto p-6 space-y-6">

    <!-- HEADER -->
    <div class="flex justify-between items-center">
        <div>
            <div id="clock" class="text-3xl font-mono"></div>
            <div class="text-xs opacity-40">SYSTEM ACTIVE</div>
        </div>

        <div class="flex gap-2">
            <button class="btn" onclick="toggleSanctuary()">Sanctuary</button>
            <button class="btn bg-red-500/20" onclick="panic()">PANIC</button>
        </div>
    </div>

    <!-- WAVE -->
    <div class="card">
        <div class="flex justify-between mb-3">
            <span>Resiliency Wave</span>
            <span id="waveVal">70%</span>
        </div>
        <input type="range" min="0" max="100" value="70" oninput="updateWave(this.value)">
    </div>

    <!-- MVS -->
    <div class="card">
        <div class="flex justify-between mb-3">
            <span>MVS Protocol</span>
            <button onclick="addTask()">+</button>
        </div>
        <div id="tasks"></div>
    </div>

    <!-- EXEC -->
    <div class="card text-center">
        <div id="timer" class="text-5xl font-mono mb-4">90</div>
        <button class="btn" onclick="startTimer()">Start Flush</button>
    </div>

    <!-- SCRIPTURE -->
    <div class="card">
        <div class="text-xs opacity-40 mb-2">TRUTH ANCHOR</div>
        <div id="scripture" class="italic"></div>
    </div>

</div>

<script>

/* STATE */
let wave = 70
let tasks = ["Drink water","Open workspace"]
let timer = 90
let running = false

/* CLOCK */
setInterval(()=>{
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString()
},1000)

/* WAVE */
function updateWave(val){
    wave = val
    document.getElementById("waveVal").innerText = val+"%"
}

/* TASKS */
function renderTasks(){
    document.getElementById("tasks").innerHTML =
        tasks.map((t,i)=>`
        <div class="flex justify-between py-2 border-b border-white/10">
            <span>${t}</span>
            <button onclick="removeTask(${i})">✓</button>
        </div>
        `).join("")
}
renderTasks()

function addTask(){
    const t = prompt("2-minute step:")
    if(t){ tasks.push(t); renderTasks() }
}
function removeTask(i){
    tasks.splice(i,1)
    renderTasks()
}

/* TIMER */
function startTimer(){
    if(running) return
    running = true

    const interval = setInterval(()=>{
        timer--
        document.getElementById("timer").innerText = timer

        if(timer<=0){
            clearInterval(interval)
            timer = 90
            running=false
            alert("Reset complete")
        }
    },1000)
}

/* PANIC */
function panic(){
    alert("Breathe. Cold water. One step.")
}

/* SANCTUARY */
function toggleSanctuary(){
    document.body.classList.toggle("sanctuary")
    nextScripture()
}

/* SCRIPTURES */
const scriptures = [
"I am fearfully and wonderfully made — Psalm 139:14",
"I am chosen — Ephesians 1:4",
"I am never alone — Deuteronomy 31:8",
"I have a sound mind — 2 Timothy 1:7",
"I have strength for this step — Philippians 4:13"
]

function nextScripture(){
    const s = scriptures[Math.floor(Math.random()*scriptures.length)]
    document.getElementById("scripture").innerText = s
}
nextScripture()

</script>

</body>
</html>
