<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pilot and the Storm — Architect Interface</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
background:#080808;
color:#f5f5f5;
font-family:Inter,sans-serif;
transition:all .5s;
overflow-x:hidden;
}

/* BLOBS */
.blob{
position:fixed;
width:600px;height:600px;
border-radius:50%;
filter:blur(140px);
z-index:-1;
animation:pulse 12s infinite;
}
@keyframes pulse{
0%,100%{opacity:.25}
50%{opacity:.6}
}

/* GLASS */
.glass{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

/* SANCTUARY MODE */
body.sanctuary{
font-family:serif;
filter:sepia(.25) contrast(.9) saturate(.9);
}

/* FADE */
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>

<body>

<div class="blob bg-amber-500/10 -top-48 -left-48"></div>
<div class="blob bg-blue-500/10 -bottom-48 -right-48"></div>

<div class="max-w-xl mx-auto p-6 pb-28">

<header class="flex justify-between mb-6">
<div>
<div id="clock" class="font-mono text-xl"></div>
</div>

<div class="flex gap-2">
<button onclick="Engine.panic()" class="px-3 py-1 bg-red-500/20 text-red-400 rounded">PANIC</button>
<button onclick="Engine.toggleSanctuary()" class="px-3 py-1 glass rounded">☯</button>
</div>
</header>

<div id="view"></div>

</div>

<nav class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around">
<button onclick="Engine.route('base')">Base</button>
<button onclick="Engine.route('exec')">Exec</button>
<button onclick="Engine.route('gov')">Gov</button>
<button onclick="Engine.route('logs')">Logs</button>
<button onclick="Engine.route('doctrine')">Doctrine</button>
</nav>
<script>

/* =========================
   CORE STATE
========================= */

const Engine = {

state:{
tab:'base',
wave:70,
logs:[],
sanctuary:false,
anchor:null,
chapter:1
},

init(){
this.load()
this.tick()
this.render()
setInterval(()=>this.tick(),1000)
setInterval(()=>this.save(),30000)
},

tick(){
document.getElementById('clock').innerText =
new Date().toLocaleTimeString()
},

route(tab){
this.state.tab = tab
this.render()
},

render(){
const v = document.getElementById('view')

if(this.state.sanctuary){
v.innerHTML = Sanctuary.render()
return
}

v.innerHTML = Modules[this.state.tab]()
Anchor.render()
},

log(msg){
this.state.logs.unshift(msg)
},

toggleSanctuary(){
this.state.sanctuary = !this.state.sanctuary
document.body.classList.toggle('sanctuary')
this.render()
},

save(){
localStorage.setItem("pilot_system", JSON.stringify(this.state))
},

load(){
const d = localStorage.getItem("pilot_system")
if(d) this.state = JSON.parse(d)
}

}

/* =========================
   ANCHOR SYSTEM (UI BASED)
========================= */

const Anchor = {

data:{

identity:[
["Psalm 139:14","I am fearfully and wonderfully made."],
["Ephesians 1:4","I am chosen before the foundation."]
],

safety:[
["Deuteronomy 31:8","I am never alone."],
["Psalm 34:18","God is close to me."]
],

peace:[
["Philippians 4:7","Peace is guarding my mind."],
["Isaiah 26:3","My mind is held in perfect peace."]
],

strength:[
["Philippians 4:13","I have strength for this step."],
["Isaiah 40:31","My strength is being renewed."]
]

},

trigger(type){
const list = this.data[type]
const pick = list[Math.floor(Math.random()*list.length)]

Engine.state.anchor = {
text:pick[1],
ref:pick[0]
}

Engine.render()
},

render(){
if(!Engine.state.anchor) return

const existing = document.getElementById("anchor-card")
if(existing) existing.remove()

const card = document.createElement("div")
card.id = "anchor-card"

card.className = `
fixed bottom-24 left-1/2 -translate-x-1/2
max-w-sm w-[90%]
glass p-5 rounded-2xl
text-center fade
`

card.innerHTML = `
<p class="text-sm italic mb-2">"${Engine.state.anchor.text}"</p>
<p class="text-[10px] opacity-50">${Engine.state.anchor.ref}</p>
`

document.body.appendChild(card)

setTimeout(()=>card.remove(),6000)
}

}

/* =========================
   MODULES
========================= */

const Modules = {

base(){
return `
<div class="space-y-6 fade">

<div class="glass p-5 rounded-2xl">
<p class="text-xs opacity-50 mb-2">Resiliency</p>
<p class="text-xl font-mono mb-3">${Engine.state.wave}%</p>
<input type="range" min="0" max="100" value="${Engine.state.wave}"
oninput="Engine.state.wave=this.value;Engine.render();State.check()">
</div>

<button onclick="Stillness.activate()"
class="w-full py-4 rounded-2xl border text-sm opacity-70">
Be Still
</button>

</div>`
},

exec(){
return `
<div class="space-y-4 fade text-center">

<button onclick="Anchor.trigger('strength')" class="text-sm">
I need strength
</button>

<button onclick="Anchor.trigger('peace')" class="text-sm">
I need peace
</button>

</div>`
},

logs(){
return `
<div class="glass p-4 text-xs space-y-2 fade">
${Engine.state.logs.map(l=>`<div>${l}</div>`).join('')}
</div>`
},

gov(){
return `<div class="glass p-4 fade">Governance coming...</div>`
}

}

/* =========================
   SANCTUARY
========================= */

const Sanctuary = {

render(){
const line = Doctrine.random()
return `
<div class="fade text-center space-y-10 pt-20">

<p class="italic text-lg opacity-80">${line}</p>

<button onclick="Anchor.trigger('peace')" class="text-xs opacity-40">
Receive Peace
</button>

</div>`
}

}

/* =========================
   STILLNESS MODE
========================= */

const Stillness = {

activate(){
const overlay = document.createElement("div")

overlay.className = `
fixed inset-0 bg-black flex items-center justify-center
z-50 fade text-center p-6
`

overlay.innerHTML = `
<div>
<p class="italic text-lg mb-6">"Be still, and know that I am God."</p>
<button onclick="this.parentElement.parentElement.remove()"
class="text-xs opacity-40">Return</button>
</div>
`

document.body.appendChild(overlay)
}

}

/* =========================
   STATE INTELLIGENCE
========================= */

const State = {

check(){
if(Engine.state.wave < 30){
Anchor.trigger('strength')
}
if(Engine.state.wave < 15){
Anchor.trigger('identity')
}
}

}

<script>

/* =========================
   ENGINE PATCH (ADD THIS)
========================= */

Engine.openChapter = function(id){
Engine.state.chapter = id
UI.openReader()
}

Engine.getDailyChapter = function(){
const day = new Date().getDate()
return (day % 33) + 1
}

/* =========================
   DOCTRINE (FULL)
========================= */

const Doctrine = {

chapters: [
{ id:1,title:"The Storm Is Real",body:"The storm is not imagined. It is felt deeply, but it is not your end."},
{ id:2,title:"You Are Not the Storm",body:"You are not your thoughts. You are the one observing them."},
{ id:3,title:"Noise Is Not Truth",body:"Loud thoughts are not authoritative thoughts."},
{ id:4,title:"The Body Remembers",body:"Your system carries memory. That does not mean you are broken."},
{ id:5,title:"Fragmentation",body:"You are not lost. You are unintegrated."},
{ id:6,title:"The Lie",body:"You are not a mistake. That voice is not truth."},
{ id:7,title:"Emotional Heat",body:"Intensity distorts reality."},
{ id:8,title:"Collapse",body:"When direction disappears, stabilize."},
{ id:9,title:"Control",body:"Control is not safety."},
{ id:10,title:"Abandonment",body:"You are not alone inside pain."},
{ id:11,title:"Breaking Point",body:"This is exposure, not the end."},

{ id:12,title:"There Is a Pilot",body:"There is still awareness within you."},
{ id:13,title:"Identity",body:"You are given identity, not earning it."},
{ id:14,title:"Fearfully Made",body:"You were designed intentionally."},
{ id:15,title:"Not Alone",body:"God is with you in this moment."},
{ id:16,title:"Carried",body:"You are being held together."},
{ id:17,title:"Externalize",body:"You don’t have to carry it alone."},
{ id:18,title:"One Step",body:"Only the next step matters."},
{ id:19,title:"Strength",body:"Strength is supplied."},
{ id:20,title:"Weakness",body:"Weakness is where power enters."},
{ id:21,title:"Claimed",body:"You belong."},
{ id:22,title:"Guarded Mind",body:"Peace protects your mind."},

{ id:23,title:"Peace Position",body:"Peace is where you stand."},
{ id:24,title:"No Rush",body:"Healing is not rushed."},
{ id:25,title:"Stillness",body:"Stillness is strength."},
{ id:26,title:"70% Life",body:"You were not built for constant strain."},
{ id:27,title:"Quiet Clarity",body:"Truth arrives quietly."},
{ id:28,title:"Begin Again",body:"You can always restart."},
{ id:29,title:"Rebuild",body:"Nothing is wasted."},
{ id:30,title:"Stability",body:"Stability is built slowly."},
{ id:31,title:"Trust",body:"Growth is happening unseen."},
{ id:32,title:"Not Alone",body:"You never were alone."},
{ id:33,title:"The Storm Does Not Win",body:"This is not your ending."}
],

get(id){
return this.chapters.find(c=>c.id===id)
},

daily(){
return this.get(Engine.getDailyChapter())
}

}

/* =========================
   UI LAYER
========================= */

const UI = {

openReader(){
const c = Doctrine.get(Engine.state.chapter)

const overlay = document.createElement("div")
overlay.className = `
fixed inset-0 bg-black/90 z-50 flex flex-col
p-6 fade
`

overlay.innerHTML = `
<div class="max-w-xl mx-auto w-full">

<button onclick="this.parentElement.parentElement.remove()"
class="mb-6 text-xs opacity-40">← Back</button>

<h1 class="text-xl mb-4">${c.title}</h1>

<p class="text-sm leading-relaxed opacity-80 mb-6">
${c.body}
</p>

<button onclick="Anchor.matchChapter(${c.id})"
class="text-xs opacity-40">Receive Anchor</button>

</div>
`

document.body.appendChild(overlay)
}

}

/* =========================
   ANCHOR MATCHING
========================= */

Anchor.matchChapter = function(id){

if(id <= 11) this.trigger("safety")
else if(id <= 22) this.trigger("identity")
else this.trigger("peace")

}

/* =========================
   MODULE UPDATE
========================= */

Modules.doctrine = function(){

const daily = Doctrine.daily()

return `
<div class="space-y-6 fade">

<div class="glass p-5 rounded-2xl">
<p class="text-xs opacity-40 mb-2">Daily Chapter</p>
<h2 class="text-lg">${daily.title}</h2>
<button onclick="Engine.openChapter(${daily.id})"
class="text-xs opacity-50 mt-2">Read</button>
</div>

<div class="space-y-2">
${Doctrine.chapters.map(c=>`
<div onclick="Engine.openChapter(${c.id})"
class="glass p-3 rounded-xl text-sm cursor-pointer hover:bg-white/5 transition">
${c.id}. ${c.title}
</div>
`).join("")}
</div>

</div>
`

}

/* =========================
   STATE → CHAPTER LOGIC
========================= */

State.check = function(){

const w = Engine.state.wave

if(w < 15){
Engine.state.chapter = 13
Anchor.trigger("identity")
}

else if(w < 30){
Engine.state.chapter = 18
Anchor.trigger("strength")
}

else if(w > 70){
Engine.state.chapter = 25
}

}

/* =========================
   SANCTUARY UPGRADE
========================= */

Sanctuary.render = function(){

const c = Doctrine.daily()

return `
<div class="fade text-center pt-20 space-y-10">

<p class="italic text-lg opacity-80">
${c.body}
</p>

<button onclick="Engine.openChapter(${c.id})"
class="text-xs opacity-40">
Read Chapter
</button>

<button onclick="Anchor.trigger('peace')"
class="text-xs opacity-30">
Receive Peace
</button>

</div>
`

}

</script>

</script>

</body>
</html>
