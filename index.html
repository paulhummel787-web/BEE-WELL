<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pilot and the Storm — Architect Interface</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
background:#080808;
color:#f5f5f5;
font-family:Inter,sans-serif;
transition:all .5s;
overflow-x:hidden;
}

/* BLOBS */
.blob{
position:fixed;
width:600px;height:600px;
border-radius:50%;
filter:blur(140px);
z-index:-1;
animation:pulse 12s infinite;
}
@keyframes pulse{
0%,100%{opacity:.25}
50%{opacity:.6}
}

/* GLASS */
.glass{
background:rgba(255,255,255,.04);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

/* SANCTUARY MODE */
body.sanctuary{
font-family:serif;
filter:sepia(.25) contrast(.9) saturate(.9);
}

/* FADE */
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>

<body>

<div class="blob bg-amber-500/10 -top-48 -left-48"></div>
<div class="blob bg-blue-500/10 -bottom-48 -right-48"></div>

<div class="max-w-xl mx-auto p-6 pb-28">

<header class="flex justify-between mb-6">
<div>
<div id="clock" class="font-mono text-xl"></div>
</div>

<div class="flex gap-2">
<button onclick="Engine.panic()" class="px-3 py-1 bg-red-500/20 text-red-400 rounded">PANIC</button>
<button onclick="Engine.toggleSanctuary()" class="px-3 py-1 glass rounded">☯</button>
</div>
</header>

<div id="view"></div>

</div>

<nav class="fixed bottom-0 left-0 right-0 glass p-4 flex justify-around">
<button onclick="Engine.route('base')">Base</button>
<button onclick="Engine.route('exec')">Exec</button>
<button onclick="Engine.route('gov')">Gov</button>
<button onclick="Engine.route('logs')">Logs</button>
<button onclick="Engine.route('doctrine')">Doctrine</button>
</nav>

<script>

/* =========================
   ENGINE
========================= */

const Engine = {

state:{
tab:'base',
wave:70,
logs:[],
sanctuary:false,
chapter:1
},

init(){
this.load()
this.tick()
this.render()
setInterval(()=>this.tick(),1000)
setInterval(()=>this.save(),30000)
},

tick(){
document.getElementById('clock').innerText =
new Date().toLocaleTimeString()
},

route(tab){
this.state.tab = tab
this.render()
},

render(){
const v = document.getElementById('view')

if(this.state.sanctuary){
v.innerHTML = Modules.sanctuary()
return
}

v.innerHTML = Modules[this.state.tab]()
},

log(msg){
this.state.logs.unshift(new Date().toLocaleTimeString()+" — "+msg)
},

panic(){
this.log("PANIC TRIGGERED")
Anchor.inject("identity")
alert("Stabilize the pilot.")
},

toggleSanctuary(){
this.state.sanctuary = !this.state.sanctuary
document.body.classList.toggle('sanctuary')
this.render()
},

save(){
localStorage.setItem("pilot_system", JSON.stringify(this.state))
},

load(){
const d = localStorage.getItem("pilot_system")
if(d) this.state = JSON.parse(d)
}

}

/* =========================
   MODULES
========================= */

const Modules = {

/* BASE */
base(){
return `
<div class="space-y-4 fade">

<div class="glass p-4 rounded">
<h2 class="text-sm mb-2">Resiliency Wave: ${Engine.state.wave}%</h2>
<input type="range" min="0" max="100" value="${Engine.state.wave}"
oninput="Engine.state.wave=this.value;Engine.render();Anchor.checkWave()">
</div>

<div class="glass p-4 rounded">
<h2 class="text-sm mb-2">MVS Protocol</h2>
<button onclick="Engine.log('MVS executed')" class="text-xs">Execute Step</button>
</div>

</div>`
},

/* EXEC */
exec(){
return `
<div class="space-y-4 fade">
<div class="glass p-4">Exec Mode</div>

<button onclick="Anchor.inject('strength')" class="text-xs">
Need Strength
</button>

<button onclick="Anchor.inject('peace')" class="text-xs">
Clear Mind
</button>

</div>`
},

/* GOV */
gov(){
return `
<div class="space-y-4 fade">

<div class="glass p-4">
<h2 class="text-sm mb-2">Capacity</h2>
<canvas id="chart"></canvas>
</div>

</div>
`
},

/* LOGS */
logs(){
return `
<div class="glass p-4 fade text-xs space-y-2">
${Engine.state.logs.map(l=>`<div>${l}</div>`).join('')}
</div>`
},

/* DOCTRINE */
doctrine(){
return Doctrine.render()
},

/* SANCTUARY */
sanctuary(){
return `
<div class="fade text-center space-y-6">

<h1 class="text-2xl">Sanctuary</h1>

<p class="italic">${Doctrine.random()}</p>

<button onclick="Anchor.inject('peace')" class="text-xs">
Receive Peace
</button>

</div>`
}

}

/* =========================
   DOCTRINE (33 CHAPTERS)
========================= */

const Doctrine = {

chapters:[
...Array.from({length:33},(_,i)=>({
id:i+1,
title:`Chapter ${i+1}`,
body:"The pilot stabilizes. The storm does not define direction."
}))
],

render(){
return `
<div class="space-y-4 fade">
${this.chapters.map(c=>`
<div class="glass p-4 rounded">
<h3 class="font-bold text-sm">${c.title}</h3>
<p class="text-xs opacity-80">${c.body}</p>
</div>`).join('')}
</div>`
},

random(){
return this.chapters[Math.floor(Math.random()*this.chapters.length)].body
}

}

/* =========================
   ANCHOR ENGINE (SCRIPTURE)
========================= */

const Anchor = {

data:{

identity:[
["Psalm 139:14","I am fearfully and wonderfully made."],
["Ephesians 1:4","I am chosen before the foundation."]
],

safety:[
["Deuteronomy 31:8","I am never alone."],
["Psalm 34:18","God is near to me."]
],

peace:[
["2 Timothy 1:7","I have a sound mind."],
["Philippians 4:7","Peace guards my mind."]
],

strength:[
["Philippians 4:13","I can take the next step."],
["Isaiah 40:31","My strength is renewed."]
]

},

inject(type){
const list = this.data[type]
const item = list[Math.floor(Math.random()*list.length)]
alert(item[1] + "\n— " + item[0])
},

checkWave(){
if(Engine.state.wave < 30){
this.inject("strength")
}
}

}

/* INIT */
Engine.init()
<script>

/* =========================
   CORE STATE
========================= */

const Engine = {

state:{
tab:'base',
wave:70,
logs:[],
sanctuary:false,
anchor:null,
chapter:1
},

init(){
this.load()
this.tick()
this.render()
setInterval(()=>this.tick(),1000)
setInterval(()=>this.save(),30000)
},

tick(){
document.getElementById('clock').innerText =
new Date().toLocaleTimeString()
},

route(tab){
this.state.tab = tab
this.render()
},

render(){
const v = document.getElementById('view')

if(this.state.sanctuary){
v.innerHTML = Sanctuary.render()
return
}

v.innerHTML = Modules[this.state.tab]()
Anchor.render()
},

log(msg){
this.state.logs.unshift(msg)
},

toggleSanctuary(){
this.state.sanctuary = !this.state.sanctuary
document.body.classList.toggle('sanctuary')
this.render()
},

save(){
localStorage.setItem("pilot_system", JSON.stringify(this.state))
},

load(){
const d = localStorage.getItem("pilot_system")
if(d) this.state = JSON.parse(d)
}

}

/* =========================
   ANCHOR SYSTEM (UI BASED)
========================= */

const Anchor = {

data:{

identity:[
["Psalm 139:14","I am fearfully and wonderfully made."],
["Ephesians 1:4","I am chosen before the foundation."]
],

safety:[
["Deuteronomy 31:8","I am never alone."],
["Psalm 34:18","God is close to me."]
],

peace:[
["Philippians 4:7","Peace is guarding my mind."],
["Isaiah 26:3","My mind is held in perfect peace."]
],

strength:[
["Philippians 4:13","I have strength for this step."],
["Isaiah 40:31","My strength is being renewed."]
]

},

trigger(type){
const list = this.data[type]
const pick = list[Math.floor(Math.random()*list.length)]

Engine.state.anchor = {
text:pick[1],
ref:pick[0]
}

Engine.render()
},

render(){
if(!Engine.state.anchor) return

const existing = document.getElementById("anchor-card")
if(existing) existing.remove()

const card = document.createElement("div")
card.id = "anchor-card"

card.className = `
fixed bottom-24 left-1/2 -translate-x-1/2
max-w-sm w-[90%]
glass p-5 rounded-2xl
text-center fade
`

card.innerHTML = `
<p class="text-sm italic mb-2">"${Engine.state.anchor.text}"</p>
<p class="text-[10px] opacity-50">${Engine.state.anchor.ref}</p>
`

document.body.appendChild(card)

setTimeout(()=>card.remove(),6000)
}

}

/* =========================
   MODULES
========================= */

const Modules = {

base(){
return `
<div class="space-y-6 fade">

<div class="glass p-5 rounded-2xl">
<p class="text-xs opacity-50 mb-2">Resiliency</p>
<p class="text-xl font-mono mb-3">${Engine.state.wave}%</p>
<input type="range" min="0" max="100" value="${Engine.state.wave}"
oninput="Engine.state.wave=this.value;Engine.render();State.check()">
</div>

<button onclick="Stillness.activate()"
class="w-full py-4 rounded-2xl border text-sm opacity-70">
Be Still
</button>

</div>`
},

exec(){
return `
<div class="space-y-4 fade text-center">

<button onclick="Anchor.trigger('strength')" class="text-sm">
I need strength
</button>

<button onclick="Anchor.trigger('peace')" class="text-sm">
I need peace
</button>

</div>`
},

logs(){
return `
<div class="glass p-4 text-xs space-y-2 fade">
${Engine.state.logs.map(l=>`<div>${l}</div>`).join('')}
</div>`
},

gov(){
return `<div class="glass p-4 fade">Governance coming...</div>`
}

}

/* =========================
   SANCTUARY
========================= */

const Sanctuary = {

render(){
const line = Doctrine.random()
return `
<div class="fade text-center space-y-10 pt-20">

<p class="italic text-lg opacity-80">${line}</p>

<button onclick="Anchor.trigger('peace')" class="text-xs opacity-40">
Receive Peace
</button>

</div>`
}

}

/* =========================
   STILLNESS MODE
========================= */

const Stillness = {

activate(){
const overlay = document.createElement("div")

overlay.className = `
fixed inset-0 bg-black flex items-center justify-center
z-50 fade text-center p-6
`

overlay.innerHTML = `
<div>
<p class="italic text-lg mb-6">"Be still, and know that I am God."</p>
<button onclick="this.parentElement.parentElement.remove()"
class="text-xs opacity-40">Return</button>
</div>
`

document.body.appendChild(overlay)
}

}

/* =========================
   STATE INTELLIGENCE
========================= */

const State = {

check(){
if(Engine.state.wave < 30){
Anchor.trigger('strength')
}
if(Engine.state.wave < 15){
Anchor.trigger('identity')
}
}

}

/* =========================
   DOCTRINE (REAL SEED)
========================= */

const Doctrine = {

chapters:[
"Peace is not found by escaping the storm, but by stabilizing the pilot.",
"You are not the chaos you feel. You are the one observing it.",
"God does not rush your healing. He walks with it.",
"The storm reveals what the system cannot hide.",
"Stillness is not weakness. It is alignment.",
"... (expand to full 33)"
],

random(){
return this.chapters[Math.floor(Math.random()*this.chapters.length)]
}

}

/* INIT */
Engine.init()

</script>
</script>

</body>
</html>
