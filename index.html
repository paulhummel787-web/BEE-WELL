<style>
:root {
    --bg:#0a0a0a;
    --panel:#111;
    --accent:#facc15;
    --text:#eee;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Inter;
    overflow:hidden;
}

/* Layout */
#app {
    display:flex;
    flex-direction:column;
    height:100vh;
}

#main {
    flex:1;
    overflow-y:auto;
    padding:20px;
}

/* NAV */
.nav {
    display:flex;
    justify-content:space-around;
    border-top:1px solid #222;
    padding:10px;
}

.nav button {
    background:none;
    border:none;
    color:#aaa;
    font-size:11px;
}

.nav button.active {
    color:var(--accent);
}

/* CARDS */
.card {
    background:var(--panel);
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    transition:.3s;
}

.card:hover {
    transform:scale(1.02);
}

/* BOOK */
.chapter {
    font-family:"Playfair Display";
    line-height:1.6;
    font-size:15px;
}

.chapter h2 {
    color:var(--accent);
}

/* SMOOTH */
.fade {
    animation:fade .4s ease;
}

@keyframes fade {
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}
</style>
</head>

/* ================= RENDER ================= */

function switchTab(tab){
    state.tab = tab;
    render();
}

function render(){
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    document.getElementById('nav-'+state.tab)?.classList.add('active');

    const main = document.getElementById('main');

    if(state.tab === 'dashboard'){
        main.innerHTML = `
        <div class="card fade">
            <h2>🐝 Bee Well System</h2>
            <p>Clarity. Calm. Direction.</p>
        </div>

    if(state.tab === 'sanctuary'){

            <p>"If you had 10% more courage, what would you do?"</p>
        </div>
        `;
    }

    if(state.tab === 'book'){
        const c = BOOK[state.chapter];

        main.innerHTML = `
        <div class="card chapter fade">
            <h2>${c.title}</h2>
            <p>${c.text}</p>

            <br>
            <button onclick="prev()">←</button>
            <button onclick="next()">→</button>
        </div>
        `;
    }

    if(state.tab === 'system'){
        main.innerHTML = `
        <div class="card fade">
            <h2>System Core</h2>
            <p>Memory Shield, Bodyguards, Audits active.</p>
        </div>
        `;
    }
}

function next(){
    if(state.chapter < BOOK.length-1){
        state.chapter++;
        render();
    }
}

function prev(){
    if(state.chapter > 0){
        state.chapter--;
        render();
    }
}

/* INIT */
render();
